<script>

  function openInBlank(url) {
    // Opens a new window with about:blank
    const newWin = window.open('about:blank', '_blank');
    
    // Ensure the window opened successfully
    if (newWin) {
      newWin.document.title = "W School Hub Revivied";
      
      // Create an iframe to house the site
      const iframe = newWin.document.createElement('iframe');
      
      // Style the iframe to fill the screen
      iframe.style.position = "fixed";
      iframe.style.top = "0";
      iframe.style.left = "0";
      iframe.style.bottom = "0";
      iframe.style.right = "0";
      iframe.style.width = "100%";
      iframe.style.height = "100%";
      iframe.style.border = "none";
      iframe.style.margin = "0";
      iframe.style.padding = "0";
      iframe.style.overflow = "auto";
      iframe.style.zIndex = "999999";
      
      // Set the source to your desired URL
      iframe.src = url;
      
      // Inject into the about:blank page
      newWin.document.body.appendChild(iframe);
      newWin.document.body.style.margin = "0";
    }
  }

  // Example usage: openInBlank('https://example.com');

</script>
